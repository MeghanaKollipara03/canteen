<!DOCTYPE html>
<html>
<head>
<title>Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Your Orders</h1>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.forEach(o=>{
document.getElementById("orders").innerHTML+=
`<p>${o.name} - ₹${o.price} - Preparing</p>`
})

</script>

</body>
</html>
